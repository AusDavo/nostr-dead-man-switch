services:
  deadman:
    image: ghcr.io/ausdavo/nostr-dead-man-switch:v0.1.0
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/data/config.yaml:ro
      - deadman-data:/data
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
    restart: unless-stopped

volumes:
  deadman-data:
