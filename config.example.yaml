# Nostr Dead Man's Switch - Configuration
# Copy this file to config.yaml and fill in your values.
# Environment variables are supported: ${VAR_NAME}

# ── Identity ──────────────────────────────────────────────

# The npub (or hex pubkey) to monitor for activity
watch_pubkey: "npub1..."

# Bot's private key for sending warning DMs
# Generate one with: nostr-deadman --generate-key
# This should NOT be your main key — use a dedicated bot key
bot_nsec: "${BOT_NSEC}"

# ── Relays ────────────────────────────────────────────────

relays:
  - "wss://relay.damus.io"
  - "wss://nos.lol"
  - "wss://relay.nostr.band"

# ── Timing ────────────────────────────────────────────────

# How long of silence before the first warning DM
# Supports: 30d, 4w, 720h
silence_threshold: "30d"

# Time between warning DMs
warning_interval: "24h"

# Number of warning DMs before triggering (default: 2)
warning_count: 2

# How often to evaluate the timer (default: 1h)
check_interval: "1h"

# ── State ─────────────────────────────────────────────────

# Where to persist state (last seen timestamp, warning count)
# Delete this file to re-arm after a trigger
state_file: "/data/state.json"

